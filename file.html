<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROOF OF BOOKINGS</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* Wider for better thumbnail spacing */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 25px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .header-info h2 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        .header-info p {
            margin: 5px 0 0 0;
            font-size: 0.85rem;
            color: #666;
        }

        .badge {
            background: var(--accent-color);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Improved Wrapper for Thumbnails */
        .embed-wrapper {
            position: relative;
            padding-bottom: 80%; /* Increased height to show more text/names */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
        }

        .embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 768px) {
            .embed-wrapper {
                padding-bottom: 180%; /* Extra tall for mobile grid browsing */
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-info">
                <h2>📁 Proof of Bookings</h2>
                <p>Showing thumbnails of recent uploads</p>
            </div>
            <span class="badge">Live View</span>
        </div>

        <div class="embed-wrapper">
            <iframe 
                src="https://drive.google.com/embeddedfolderview?id=1p5IUxHn9kNJ-GzAM2Tge-Fz0P5j9ywwN#grid" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
