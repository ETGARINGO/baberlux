<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROOF OF BOOKINGS</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .header-text h2 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.5rem;
        }

        .header-text p {
            margin: 5px 0 0 0;
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .badge {
            background: var(--accent-color);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .embed-wrapper {
            position: relative;
            /* List view looks better with a slightly different ratio */
            padding-bottom: 65%; 
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
        }

        .embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        @media (max-width: 600px) {
            .embed-wrapper {
                padding-bottom: 160%; /* Taller for mobile list scrolling */
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-text">
                <h2>📁 Proof of Bookings</h2>
                <p>Click "Last Modified" inside the window to see newest first.</p>
            </div>
            <span class="badge">Live Repository</span>
        </div>

        <div class="embed-wrapper">
            <iframe 
                src="https://drive.google.com/embeddedfolderview?id=1p5IUxHn9kNJ-GzAM2Tge-Fz0P5j9ywwN#list" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
