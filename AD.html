<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOF | Booking Terminal</title>
    
    <style>
        :root {
            --bg-dark: #000000;
            --gold-flat: #a67c00; 
            --gold-text: #d4af37;
            --glass: rgba(20, 20, 22, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-dark); 
            position: fixed; font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.6);
        }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3); z-index: 10;
            transition: opacity 0.5s ease;
        }

        .login-box {
            text-align: center; padding: 45px 30px; border-radius: 24px;
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 350px; width: 88%; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .login-box h2 {
            color: var(--gold-text); letter-spacing: 4px; font-weight: 900;
            margin: 10px 0 5px 0; text-transform: uppercase; font-size: 1.25rem;
        }

        .location-tag { font-size: 0.6rem; color: #888; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        input[type="password"] {
            width: 100%; padding: 18px; margin-bottom: 15px;
            background: #000; border: 1px solid #222; border-radius: 10px;
            color: #fff; text-align: center; font-size: 1.1rem;
            letter-spacing: 6px; outline: none; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            background: var(--gold-flat); color: #000; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; margin-bottom: 20px;
        }

        .btn-option {
            width: 100%; padding: 14px; border: 1px solid #333; border-radius: 10px;
            background: rgba(255,255,255,0.02); color: var(--gold-text); 
            font-weight: 700; text-transform: uppercase; cursor: pointer; 
            font-size: 0.8rem; margin-bottom: 10px;
        }

        /* --- FLOATING EXIT BUTTON --- */
        #exit-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: var(--gold-flat);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none; /* Hidden until frame opens */
            cursor: pointer;
            text-transform: uppercase;
        }

        #secure-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 100; background: white;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <video autoplay muted loop playsinline id="bg-video">
        <source src="IMG_1039.MOV" type="video/mp4">
    </video>

    <button id="exit-btn" onclick="closeSystem()">✕ Close & Return</button>

    <div id="auth-overlay">
        <div class="login-box">
            <div style="font-size: 2.5rem;">👑</div>
            <h2>KING OF FADEZ</h2>
            <div class="location-tag">Dasmariñas, Cavite</div>
            
            <input type="password" id="accessKey" placeholder="ADMIN KEY" maxlength="8" autocomplete="off">
            <button class="btn-main" onclick="validateKey()">UNLOCK ADMIN</button>
            
            <div style="margin: 20px 0; height: 1px; background: rgba(255,255,255,0.1);"></div>
            
            <button class="btn-option" onclick="openViewBook()">📖 VIEW BOOK (CLIENT)</button>
            <button class="btn-option" onclick="openDTR()">⏱️ DTR PORTAL</button>
            <button class="btn-option" onclick="openProof()">📁 PROOF OF BOOKINGS</button>
            
            <div class="contact-footer" style="margin-top:25px; font-size:0.65rem; color:#666;">
                <div>📧 Kingoffadezph@gmail.com</div>
                <div>📍 Blk 4, Lot 18 Congressional Ave</div>
            </div>
            
            <p id="error-msg" style="color: #ff4444; font-size: 0.7rem; margin-top: 15px; display: none;">INVALID ADMIN KEY</p>
        </div>
    </div>

    <iframe id="secure-frame" src=""></iframe>

    <script>
        const MASTER_KEY = "1234";
        const MANAGER_KEY = "101";

        const URL_BOOKING  = "https://script.google.com/macros/s/AKfycbxjLrPyptwEo4qUhYOIYeptfoN0lLQo_oh_bBE3rjLXSjzunU2YnxaL-Yvmcy-BIEDeEg/exec?page=Admin";
        const URL_MANAGER  = "https://script.google.com/macros/s/AKfycbwr4AVfHrczlTyt_NF0PjUGEz__LYm2rTgiBe8d7-8Y4G_PX4nM2ePgUb5JnV_dFEnS5Q/exec?page=admin";
        const URL_DTR      = "https://script.google.com/macros/s/AKfycbxAI_eQHkm_O8X4KkynDq-WDYFpgxm7cDuxgn-jgqT3e7GUfe1vOqJlLmK-LoN6hBmy/exec";
        const URL_VIEWBOOK = "https://kingoffadezbarbershop.web247.online/";
        // YOUR GOOGLE DRIVE FOLDER (GRID VIEW)
        const URL_PROOF    = "https://drive.google.com/embeddedfolderview?id=15x5-v0ykpQjiEr7KAcXAg4qczx0iF3cm#grid";

        const overlay = document.getElementById('auth-overlay');
        const frame   = document.getElementById('secure-frame');
        const error   = document.getElementById('error-msg');
        const exitBtn = document.getElementById('exit-btn');

        function validateKey() {
            const input = document.getElementById('accessKey').value;
            if (input === MASTER_KEY) {
                launchSystem(URL_BOOKING);
            } else if (input === MANAGER_KEY) {
                launchSystem(URL_MANAGER);
            } else {
                error.style.display = "block";
                document.getElementById('accessKey').value = "";
            }
        }

        function openDTR() { launchSystem(URL_DTR); }
        function openViewBook() { launchSystem(URL_VIEWBOOK); }
        function openProof() { launchSystem(URL_PROOF); }

        function launchSystem(targetUrl) {
            frame.src = targetUrl;
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                frame.style.display = "block";
                exitBtn.style.display = "block"; // Show floating exit button
            }, 500);
        }

        function closeSystem() {
            frame.style.display = "none";
            exitBtn.style.display = "none";
            frame.src = ""; // Clear frame to save data/memory
            overlay.style.display = "flex";
            setTimeout(() => { overlay.style.opacity = "1"; }, 10);
        }

        document.getElementById("accessKey").addEventListener("keyup", e => {
            if (e.key === "Enter") validateKey();
        });

        window.onload = () => { document.getElementById("accessKey").focus(); };
    </script>
</body>
</html>
