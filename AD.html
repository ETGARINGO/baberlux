<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOF | Booking Terminal</title>
    
    <style>
        :root {
            --bg-dark: #000000;
            --gold-flat: #a67c00; 
            --gold-text: #d4af37;
            --glass: rgba(20, 20, 22, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-dark); 
            position: fixed; font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.6);
        }

        /* --- PERMANENT FLOATING BUTTON (For Assistants/Quick Access) --- */
        #floating-proof-trigger {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--gold-flat);
            color: #000;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        /* --- THE FOLDER OVERLAY --- */
        #folder-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .folder-header {
            padding: 15px 20px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold-flat);
        }

        .close-folder {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        #folder-frame { width: 100%; height: 100%; border: none; }

        /* --- SYSTEM BOXES --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3); z-index: 10;
            transition: opacity 0.5s ease;
        }

        .login-box {
            text-align: center; padding: 40px 30px; border-radius: 24px;
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 350px; width: 88%; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 10px;
            background: var(--gold-flat); color: #000; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; margin-bottom: 15px;
        }

        .btn-option {
            width: 100%; padding: 12px; border: 1px solid #333; border-radius: 10px;
            background: rgba(255,255,255,0.02); color: var(--gold-text); 
            font-weight: 700; text-transform: uppercase; cursor: pointer; 
            font-size: 0.75rem; margin-bottom: 8px;
        }

        #exit-btn {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 200; background: #fff; color: #000; border: none;
            padding: 10px 20px; border-radius: 50px; font-weight: 800;
            font-size: 0.7rem; display: none; cursor: pointer;
        }

        #secure-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 100; background: white;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <video autoplay muted loop playsinline id="bg-video">
        <source src="IMG_1039.MOV" type="video/mp4">
    </video>

    <button id="floating-proof-trigger" onclick="toggleFolder(true)">
        📁 <span>Proof of Bookings</span>
    </button>

    <button id="exit-btn" onclick="closeSystem()">✕ Exit Terminal</button>

    <div id="auth-overlay">
        <div class="login-box">
            <div style="font-size: 2rem;">👑</div>
            <h2 style="color:var(--gold-text); margin: 10px 0 20px 0;">KING OF FADEZ</h2>
            
            <input type="password" id="accessKey" placeholder="ADMIN KEY" maxlength="8" autocomplete="off" 
                style="width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #222; border-radius: 10px; color: #fff; text-align: center;">
            
            <button class="btn-main" onclick="validateKey()">UNLOCK ADMIN</button>
            
            <div style="margin: 15px 0; height: 1px; background: rgba(255,255,255,0.1);"></div>
            
            <button class="btn-option" style="background: rgba(166, 124, 0, 0.1); border-color: var(--gold-flat);" onclick="toggleFolder(true)">📁 Proof of Bookings</button>
            
            <button class="btn-option" onclick="openViewBook()">📖 CLIENT BOOKING VIEW</button>
            <button class="btn-option" onclick="openDTR()">⏱️ DTR PORTAL</button>
            
            <div id="error-msg" style="color: #ff4444; font-size: 0.7rem; margin-top: 10px; display: none;">ACCESS DENIED</div>
        </div>
    </div>

    <iframe id="secure-frame" src=""></iframe>

    <div id="folder-overlay">
        <div class="folder-header">
            <span style="color: var(--gold-text); font-weight: bold; font-size: 0.8rem;">KOF | PROOF REPOSITORY</span>
            <button class="close-folder" onclick="toggleFolder(false)">CLOSE ✕</button>
        </div>
        <iframe id="folder-frame" src=""></iframe>
    </div>

    <script>
        const MASTER_KEY = "1234";
        const MANAGER_KEY = "101";

        const URL_BOOKING  = "https://script.google.com/macros/s/AKfycbxjLrPyptwEo4qUhYOIYeptfoN0lLQo_oh_bBE3rjLXSjzunU2YnxaL-Yvmcy-BIEDeEg/exec?page=Admin";
        const URL_MANAGER  = "https://script.google.com/macros/s/AKfycbwr4AVfHrczlTyt_NF0PjUGEz__LYm2rTgiBe8d7-8Y4G_PX4nM2ePgUb5JnV_dFEnS5Q/exec?page=admin";
        const URL_DTR      = "https://script.google.com/macros/s/AKfycbxAI_eQHkm_O8X4KkynDq-WDYFpgxm7cDuxgn-jgqT3e7GUfe1vOqJlLmK-LoN6hBmy/exec";
        const URL_VIEWBOOK = "https://kingoffadezbarbershop.web247.online/";
        const URL_PROOF    = "https://drive.google.com/embeddedfolderview?id=15x5-v0ykpQjiEr7KAcXAg4qczx0iF3cm#grid";

        const overlay = document.getElementById('auth-overlay');
        const frame   = document.getElementById('secure-frame');
        const exitBtn = document.getElementById('exit-btn');
        const folderOverlay = document.getElementById('folder-overlay');
        const folderFrame = document.getElementById('folder-frame');

        // Toggle the Floating Folder
        function toggleFolder(show) {
            if (show) {
                folderFrame.src = URL_PROOF;
                folderOverlay.style.display = 'flex';
            } else {
                folderOverlay.style.display = 'none';
                folderFrame.src = '';
            }
        }

        function validateKey() {
            const input = document.getElementById('accessKey').value;
            if (input === MASTER_KEY) launchSystem(URL_BOOKING);
            else if (input === MANAGER_KEY) launchSystem(URL_MANAGER);
            else {
                document.getElementById('error-msg').style.display = "block";
                document.getElementById('accessKey').value = "";
            }
        }

        function openDTR() { launchSystem(URL_DTR); }
        function openViewBook() { launchSystem(URL_VIEWBOOK); }

        function launchSystem(targetUrl) {
            frame.src = targetUrl;
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                frame.style.display = "block";
                exitBtn.style.display = "block";
            }, 500);
        }

        function closeSystem() {
            frame.style.display = "none";
            exitBtn.style.display = "none";
            frame.src = "";
            overlay.style.display = "flex";
            setTimeout(() => { overlay.style.opacity = "1"; }, 10);
        }

        document.getElementById("accessKey").addEventListener("keyup", e => {
            if (e.key === "Enter") validateKey();
        });
    </script>
</body>
</html>
