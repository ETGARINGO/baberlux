<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOF | Booking Terminal</title>
    
    <style>
        :root {
            --bg-dark: #000000;
            --gold-flat: #a67c00; 
            --gold-text: #d4af37;
            --glass: rgba(20, 20, 22, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-dark); 
            position: fixed; font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.6);
        }

        /* --- UI OVERLAYS --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.3); z-index: 10;
            transition: opacity 0.5s ease;
        }

        .login-box {
            text-align: center; padding: 45px 30px; border-radius: 24px;
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            max-width: 350px; width: 88%; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .btn-option {
            width: 100%; padding: 14px; border: 1px solid #333; border-radius: 10px;
            background: rgba(255,255,255,0.02); color: var(--gold-text); 
            font-weight: 700; text-transform: uppercase; cursor: pointer; 
            font-size: 0.8rem; margin-bottom: 10px;
        }

        /* --- THE INSTANT FLOATING MODAL --- */
        #folder-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 92%; height: 80%;
            max-width: 1000px;
            z-index: 1000;
            background: white;
            border-radius: 15px;
            border: 2px solid var(--gold-flat);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #folder-modal.active {
            display: block; opacity: 1; transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            background: #1a1a1a; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- NAVIGATION BUTTONS (FOOTER) --- */
        #nav-controls {
            position: fixed; bottom: 20px; width: 100%;
            display: none; justify-content: center; gap: 15px; z-index: 500;
        }

        .floating-btn {
            padding: 12px 20px; border-radius: 50px; border: none;
            font-weight: 800; font-size: 0.7rem; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-proof-toggle { background: var(--gold-flat); color: black; }
        .btn-exit { background: #ff4444; color: white; }

        #secure-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 100; background: white;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <video autoplay muted loop playsinline id="bg-video">
        <source src="IMG_1039.MOV" type="video/mp4">
    </video>

    <div id="nav-controls">
        <button class="floating-btn btn-proof-toggle" onclick="toggleProofModal()">📁 Instant Proof View</button>
        <button class="floating-btn btn-exit" onclick="closeSystem()">✕ Close All</button>
    </div>

    <div id="auth-overlay">
        <div class="login-box">
            <div style="font-size: 2rem;">👑</div>
            <h2 style="color:var(--gold-text); margin:10px 0;">KING OF FADEZ</h2>
            
            <input type="password" id="accessKey" placeholder="ADMIN KEY" maxlength="8" 
                   style="width:100%; padding:15px; background:#000; color:#fff; border:1px solid #333; border-radius:10px; text-align:center; margin-bottom:15px;">
            <button onclick="validateKey()" style="width:100%; padding:15px; background:var(--gold-flat); border:none; border-radius:10px; font-weight:800; cursor:pointer; margin-bottom:20px;">UNLOCK ADMIN</button>
            
            <div style="height:1px; background:rgba(255,255,255,0.1); margin:15px 0;"></div>
            
            <button class="btn-option" onclick="launchSystem('https://kingoffadezbarbershop.web247.online/')">📖 VIEW BOOK (CLIENT)</button>
            <button class="btn-option" onclick="launchSystem('https://script.google.com/macros/s/AKfycbxAI_eQHkm_O8X4KkynDq-WDYFpgxm7cDuxgn-jgqT3e7GUfe1vOqJlLmK-LoN6hBmy/exec')">⏱️ DTR PORTAL</button>
            <button class="btn-option" style="border-color:var(--gold-flat);" onclick="toggleProofModal()">📁 QUICK FOLDER VIEW</button>
        </div>
    </div>

    <div id="folder-modal">
        <div class="modal-header">
            <span style="font-size:0.7rem; color:var(--gold-text); font-weight:bold;">REPOSITORY: PROOF OF BOOKINGS</span>
            <button onclick="toggleProofModal()" style="background:#ff4444; color:white; border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">CLOSE ✕</button>
        </div>
        <iframe id="proof-frame" src="" style="width:100%; height:calc(100% - 40px); border:none;"></iframe>
    </div>

    <iframe id="secure-frame" src=""></iframe>

    <script>
        const MASTER_KEY = "1234";
        const MANAGER_KEY = "101";

        const URL_BOOKING  = "https://script.google.com/macros/s/AKfycbxjLrPyptwEo4qUhYOIYeptfoN0lLQo_oh_bBE3rjLXSjzunU2YnxaL-Yvmcy-BIEDeEg/exec?page=Admin";
        const URL_MANAGER  = "https://script.google.com/macros/s/AKfycbwr4AVfHrczlTyt_NF0PjUGEz__LYm2rTgiBe8d7-8Y4G_PX4nM2ePgUb5JnV_dFEnS5Q/exec?page=admin";
        const URL_PROOF    = "https://drive.google.com/embeddedfolderview?id=15x5-v0ykpQjiEr7KAcXAg4qczx0iF3cm#grid";

        const overlay = document.getElementById('auth-overlay');
        const mainFrame = document.getElementById('secure-frame');
        const proofModal = document.getElementById('folder-modal');
        const proofFrame = document.getElementById('proof-frame');
        const navControls = document.getElementById('nav-controls');

        function validateKey() {
            const input = document.getElementById('accessKey').value;
            if (input === MASTER_KEY) launchSystem(URL_BOOKING);
            else if (input === MANAGER_KEY) launchSystem(URL_MANAGER);
            else alert("INVALID KEY");
        }

        function launchSystem(url) {
            mainFrame.src = url;
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                mainFrame.style.display = "block";
                navControls.style.display = "flex";
            }, 500);
        }

        // Toggle Proof folder instantly without leaving current navigation
        function toggleProofModal() {
            if (proofModal.classList.contains('active')) {
                proofModal.classList.remove('active');
                setTimeout(() => { proofModal.style.display = 'none'; }, 300);
            } else {
                if (!proofFrame.src) proofFrame.src = URL_PROOF; // Load only once
                proofModal.style.display = 'block';
                setTimeout(() => { proofModal.classList.add('active'); }, 10);
            }
        }

        function closeSystem() {
            mainFrame.style.display = "none";
            navControls.style.display = "none";
            mainFrame.src = "";
            overlay.style.display = "flex";
            setTimeout(() => { overlay.style.opacity = "1"; }, 10);
            if (proofModal.classList.contains('active')) toggleProofModal();
        }
    </script>
</body>
</html>
